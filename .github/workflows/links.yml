name: Actualizar enlaces de plataformas

on:
  schedule:
    - cron: "0 4 * * 1" # cada lunes a las 4:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Chromium para Playwright
        run: npx playwright install --with-deps chromium

      - name: Buscar enlaces exactos en iVoox
        run: npm run links:ivoox
        continue-on-error: true

      - name: Buscar enlaces exactos en Apple Podcasts
        run: npm run links:apple
        continue-on-error: true

      - name: Buscar enlaces exactos en Amazon Music
        run: npm run links:amazon
        continue-on-error: true

      - name: Buscar enlaces exactos en Spotify
        run: npm run links:spotify
        continue-on-error: true

      - name: Regenerar páginas con los enlaces nuevos
        run: npm run build

      - name: Commitear cambios si hay enlaces nuevos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios, nada que publicar."
          else
            git commit -m "Actualizar enlaces de plataformas automáticamente"
            git push
          fi

      - name: Avisar si algo ha fallado
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "⚠️ Falló el workflow 'Actualizar enlaces de plataformas'";
            const body = `La ejecución [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) ha fallado. Revisa los logs.`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "workflow-failure",
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["workflow-failure"],
              });
            }
