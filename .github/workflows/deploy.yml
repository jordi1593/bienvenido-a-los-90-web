name: Desplegar web

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerar el sitio
        run: npm run build

      - name: Ensamblar carpeta pública
        run: |
          mkdir -p dist
          cp index.html styles.css app.js nav.js dist/
          cp CNAME dist/ 2>/dev/null || true
          cp -r images dist/
          cp -r episodios dist/
          cp episodes-list.json sitemap.xml robots.txt dist/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
