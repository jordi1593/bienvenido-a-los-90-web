name: Actualizar episodios

on:
  schedule:
    - cron: "0 1 * * *" # cada día a la 01:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scrapear el blog
        run: npm run scrape

      - name: Comprobar si hay episodios nuevos
        id: check
        run: |
          if git diff --quiet -- episodes.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Episodios nuevos detectados."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Instalar dependencias (solo si hay episodios nuevos)
        if: steps.check.outputs.changed == 'true'
        run: npm install

      - name: Instalar Chromium para Playwright (solo si hay episodios nuevos)
        if: steps.check.outputs.changed == 'true'
        run: npx playwright install --with-deps chromium

      - name: Buscar enlace exacto en iVoox
        if: steps.check.outputs.changed == 'true'
        run: npm run links:ivoox
        continue-on-error: true

      - name: Buscar enlace exacto en Apple Podcasts
        if: steps.check.outputs.changed == 'true'
        run: npm run links:apple
        continue-on-error: true

      - name: Buscar enlace exacto en Amazon Music
        if: steps.check.outputs.changed == 'true'
        run: npm run links:amazon
        continue-on-error: true

      - name: Buscar enlace exacto en Spotify
        if: steps.check.outputs.changed == 'true'
        run: npm run links:spotify
        continue-on-error: true

      - name: Regenerar el sitio
        run: npm run build

      - name: Commitear cambios si los hay
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios, nada que publicar."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Actualizar episodios y enlaces automaticamente"
            git pull --rebase origin main
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensamblar carpeta pública
        if: steps.commit.outputs.pushed == 'true'
        run: |
          mkdir -p dist
          cp index.html 404.html privacidad.html fotos.html directo.html styles.css app.js nav.js dist/
          cp CNAME dist/ 2>/dev/null || true
          cp -r fonts dist/
          cp -r images dist/
          cp -r fotos dist/
          cp -r episodios dist/
          cp -r data dist/
          cp -r etiquetas dist/
          cp directo.json dist/
          cp -r directo dist/
          cp sitemap.xml robots.txt dist/

      - uses: actions/configure-pages@v5
        if: steps.commit.outputs.pushed == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.commit.outputs.pushed == 'true'
        with:
          path: dist

  deploy:
    needs: update
    if: needs.update.outputs.pushed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify-on-failure:
    needs: [update, deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = "⚠️ Falló el workflow 'Actualizar episodios'";
            const body = `La ejecución [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) ha fallado. Revisa los logs.`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "workflow-failure",
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["workflow-failure"],
              });
            }
