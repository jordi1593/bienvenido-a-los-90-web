name: Actualizar episodios

on:
  schedule:
    - cron: "0 * * * *" # cada hora
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scrapear blog y regenerar sitio
        run: npm run update

      - name: Commitear cambios si hay episodios nuevos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios, nada que publicar."
          else
            git commit -m "Actualizar episodios automáticamente"
            git push
          fi
