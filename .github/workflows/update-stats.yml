name: Actualizar estadísticas de episodios

on:
  schedule:
    - cron: "0 3 * * *" # cada día a las 3:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Obtener estadísticas de iVoox
        run: node fetch-ivoox-stats.mjs

      - name: Comprobar si hay cambios en las estadísticas
        id: check
        run: |
          if git diff --quiet episodes.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin cambios en las estadísticas."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Estadísticas actualizadas, regenerando el sitio..."
          fi

      - name: Regenerar el sitio con las estadísticas actualizadas
        if: steps.check.outputs.changed == 'true'
        run: npm run build

      - name: Commitear cambios
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Actualizar estadísticas de episodios desde iVoox"
          git push

      - name: Ensamblar carpeta pública
        if: steps.check.outputs.changed == 'true'
        run: |
          mkdir -p dist
          cp index.html 404.html privacidad.html fotos.html styles.css app.js nav.js dist/
          cp CNAME dist/ 2>/dev/null || true
          cp -r images dist/
          cp -r fotos dist/
          cp -r episodios dist/
          cp -r data dist/
          cp -r etiquetas dist/
          cp sitemap.xml robots.txt dist/

      - uses: actions/configure-pages@v5
        if: steps.check.outputs.changed == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: steps.check.outputs.changed == 'true'
        with:
          path: dist

  deploy:
    needs: stats
    if: needs.stats.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify-on-failure:
    needs: [stats, deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = "⚠️ Falló el workflow 'Actualizar estadísticas de episodios'";
            const body = `La ejecución [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) ha fallado. Revisa los logs.`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "workflow-failure",
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["workflow-failure"],
              });
            }
