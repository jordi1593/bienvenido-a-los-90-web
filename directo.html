:root{--bg:#ffffff;--bg-flat:#ffffff;--bg-card:#f4f2f5;--text:#000000;--text-dim:#2b2b2b;--accent:#c41750;--accent-2:#000000;--border:rgba(0,0,0,0.15);--radius:4px;--font-display:"Space Grotesk",sans-serif;--font-body:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--font-brand:"Poppins",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--map-land:#e8e2f0;--map-stroke:#c5b8d4;--map-water:#dce8f5}

.container{max-width:1180px;margin:0 auto;padding:0 1.5rem}

/* NAV */
.topnav{background:var(--bg-flat);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
.topnav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}

.topnav-links{display:flex;gap:1.75rem;list-style:none;margin:0;padding:0}
.topnav-links a{color:var(--text);text-decoration:none;font-size:.8rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:inline-flex;align-items:center;gap:.35em}

.nav-actions{display:flex;align-items:center;gap:.75rem}
.theme-toggle{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--text);cursor:pointer;transition:border-color .15s ease,color .15s ease}
.theme-toggle svg{width:18px;height:18px}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.theme-toggle .icon-moon{display:none}[data-theme="dark"] .theme-toggle .icon-sun{display:none}[data-theme="dark"] .theme-toggle .icon-moon{display:block}
.nav-toggle{display:none;align-items:center;justify-content:center;width:40px;height:40px;border:none;background:transparent;color:var(--text);cursor:pointer;padding:0}
.nav-toggle svg{width:24px;height:24px}
@media(max-width:720px){.topnav-links{position:absolute;top:64px;left:0;right:0;flex-direction:column;gap:0;background:var(--bg-flat);border-top:1px solid var(--border);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .2s ease}.topnav-links.open{max-height:400px}.topnav-links a{padding:.9rem 1.5rem;border-bottom:1px solid var(--border)}.nav-toggle{display:flex}}

/* PAGE LAYOUT */
.page-hero{padding:3rem 0 1.5rem;text-align:center}
.page-hero h1{font-family:var(--font-brand);font-weight:800;font-size:clamp(1.8rem,4vw,2.8rem);margin:0 0 .5rem;letter-spacing:-.02em}

#spain-map{width:100%;height:auto;display:block}

/* City markers */
.city-marker{cursor:pointer}
.city-marker circle.pulse{fill:var(--accent);opacity:.25;transform-origin:center;animation:pulse 2s ease-in-out infinite}
.city-marker circle.dot{fill:var(--accent);transition:r .15s ease}
.city-marker:hover circle.dot{r:10}
.city-marker:hover circle.pulse{animation-play-state:paused;opacity:.4}
.city-label{font-family:var(--font-body);font-size:13px;font-weight:700;fill:var(--text);pointer-events:none;user-select:none;transition:fill .15s}
.city-marker:hover .city-label{fill:var(--accent)}
@keyframes pulse{0%,100%{r:14;opacity:.25}50%{r:20;opacity:.1}}

/* PANEL */
.city-panel{display:none;max-width:900px;margin:2rem auto 4rem;padding:0 1rem}
.city-panel.open{display:block}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:1rem}
.panel-header h2{font-family:var(--font-brand);font-weight:800;font-size:1.6rem;margin:0;letter-spacing:-.02em}

.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.5rem}

.event-card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.event-card-body{padding:1rem;flex:1;display:flex;flex-direction:column;gap:.35rem}

.event-card-cta{margin-top:auto;padding-top:.75rem;font-size:.8rem;font-weight:700;color:var(--accent);letter-spacing:.04em;text-transform:uppercase}

<script>
(function () {
  const DATA_URL = "directo.json";
  let data = null;

  async function init() {
    data = await (await fetch(DATA_URL)).json();
    document.querySelectorAll(".city-marker").forEach((marker) => {
      marker.addEventListener("click", () => openCity(marker.dataset.city));
      marker.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openCity(marker.dataset.city); }
      });
    });
    document.getElementById("panelClose").addEventListener("click", closePanel);
  }

  function openCity(cityName) {
    const city = data.find((c) => c.ciudad === cityName);
    if (!city) return;

    document.getElementById("panelTitle").textContent = city.ciudad;

    const grid = document.getElementById("eventsGrid");
    grid.innerHTML = city.eventos.map((ev) => `
      <a class="event-card" href="episodios/${ev.episodioSlug}.html">
        <img src="${ev.cartel}" alt="Cartel de ${ev.titulo}" loading="lazy" />
        <div class="event-card-body">
          <div class="event-card-title">${ev.titulo}</div>
          <div class="event-card-meta">${ev.lugar} · ${ev.fecha}</div>
          <div class="event-card-cta">Escuchar episodio →</div>
        </div>
      </a>
    `).join("");

    const panel = document.getElementById("cityPanel");
    panel.classList.add("open");
    panel.scrollIntoView({ behavior: "smooth", block: "nearest" });

    document.querySelectorAll(".city-marker").forEach((m) => m.classList.remove("selected"));
    document.querySelector(`.city-marker[data-city="${cityName}"]`).classList.add("selected");
  }

  function closePanel() {
    document.getElementById("cityPanel").classList.remove("open");
    document.querySelectorAll(".city-marker").forEach((m) => m.classList.remove("selected"));
  }

  init();
})();
</script>
