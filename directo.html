@font-face{font-family:'Space Grotesk';font-style:normal;font-weight:400 700;font-display:optional;src:url('/fonts/sg-latin.woff2') format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}

:root{
  --bg:#ffffff;--bg-flat:#ffffff;--bg-card:#f4f2f5;--text:#000000;--text-dim:#2b2b2b;
  --accent:#c41750;--accent-dark:#9e1240;--accent-mid:#d4527a;--accent-subtle:rgba(196,23,80,0.08);
  --accent-2:#000000;--border:rgba(0,0,0,0.15);--radius:4px;--radius-lg:12px;--radius-full:999px;
  --font-display:"Space Grotesk",sans-serif;
  --font-body:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-brand:"Poppins",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --map-land:#e8e2f0;--map-stroke:#c5b8d4;--map-water:#dce8f5;
}
[data-theme="dark"]{
  --bg:#16131a;--bg-flat:#16131a;--bg-card:#221d29;--text:#f5f3f6;--text-dim:#b9b2c0;
  --accent:#ff5d85;--accent-dark:#e03d65;--accent-mid:#ff8aa8;--accent-subtle:rgba(255,93,133,0.12);
  --accent-2:#ffffff;--border:rgba(255,255,255,0.15);
  --map-land:#2a2335;--map-stroke:#4a3d5c;--map-water:#1a2030;
}

*{box-sizing:border-box}
:focus{outline:none}:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.no-transition,.no-transition *{transition:none !important}
body{margin:0;font-family:var(--font-body);background:var(--bg-flat);color:var(--text);line-height:1.5;transition:background-color .2s ease,color .2s ease}
.container{max-width:1180px;margin:0 auto;padding:0 1.5rem}
.font-brand{font-family:var(--font-brand);font-weight:800}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* NAV */
.topnav{background:var(--bg-flat);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
.topnav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{display:flex;align-items:center;color:var(--text);text-decoration:none;font-family:var(--font-display);font-weight:700;font-size:1rem;letter-spacing:.02em;text-transform:uppercase}
.brand-logo{width:1.8em;height:1.8em;object-fit:contain;flex-shrink:0;margin-right:-.35em}
.logo-dark{display:none}[data-theme="dark"] .logo-light{display:none}[data-theme="dark"] .logo-dark{display:block}
.topnav-links{display:flex;gap:1.75rem;list-style:none;margin:0;padding:0}
.topnav-links a{color:var(--text);text-decoration:none;font-size:.8rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:inline-flex;align-items:center;gap:.35em}
.topnav-links a:hover,.topnav-links a.active{color:var(--accent)}
.nav-actions{display:flex;align-items:center;gap:.75rem}
.theme-toggle{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--text);cursor:pointer;transition:border-color .15s ease,color .15s ease}
.theme-toggle svg{width:18px;height:18px}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.theme-toggle .icon-moon{display:none}[data-theme="dark"] .theme-toggle .icon-sun{display:none}[data-theme="dark"] .theme-toggle .icon-moon{display:block}
.nav-toggle{display:none;align-items:center;justify-content:center;width:40px;height:40px;border:none;background:transparent;color:var(--text);cursor:pointer;padding:0}
.nav-toggle svg{width:24px;height:24px}
@media(max-width:720px){
  .topnav-links{position:absolute;top:64px;left:0;right:0;flex-direction:column;gap:0;background:var(--bg-flat);border-top:1px solid var(--border);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .2s ease}
  .topnav-links.open{max-height:400px}
  .topnav-links a{padding:.9rem 1.5rem;border-bottom:1px solid var(--border)}
  .nav-toggle{display:flex}
}

/* SECTION TITLE — same as episodios */
.section-title{
  font-family:var(--font-display);font-weight:800;font-size:1rem;text-transform:uppercase;
  letter-spacing:.35em;color:var(--text);margin:2.5rem 0 1.25rem;
  display:flex;align-items:center;gap:1rem;white-space:nowrap;
}
.section-title::before,.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* PAGE HERO */
.page-hero{padding:3rem 0 0}
.page-hero h1{font-family:var(--font-brand);font-weight:800;font-size:1rem;text-transform:uppercase;letter-spacing:.35em;color:var(--text);margin:2rem 0 1.25rem;display:flex;align-items:center;gap:1rem;white-space:nowrap}
.page-hero h1::before,.page-hero h1::after{content:'';flex:1;height:1px;background:var(--border)}
.page-hero p{color:var(--text-dim);margin:.4rem 0 0;font-size:1rem;text-align:center}

/* MAP */
.map-wrapper{position:relative;max-width:900px;margin:2.5rem auto 0;padding:0 1rem}
#spain-map{width:100%;height:auto;display:block}

/* City markers */
.city-marker{cursor:pointer}
.city-marker circle.pulse{fill:var(--accent);opacity:.25;animation:pulse 2s ease-in-out infinite}
.city-marker circle.dot{fill:var(--accent);transition:transform .15s ease}
.city-marker:hover circle.dot{transform:scale(1.5)}
.city-marker:hover circle.pulse{animation-play-state:paused;opacity:.4}
.city-label{font-family:var(--font-body);font-size:13px;font-weight:700;fill:var(--text);pointer-events:none;user-select:none}
.city-marker:hover .city-label{fill:var(--accent)}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.25}50%{transform:scale(1.9);opacity:.1}}

/* CITY PANEL */
.city-panel{display:none;padding:0 0 4rem}
.city-panel.open{display:block}

.panel-header{
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:0;
  padding:1.4rem 1.5rem;background:var(--bg-card);border-radius:10px;
  border-top:3px solid var(--accent);
}
.panel-header .section-title{flex:1;margin-bottom:0;position:relative;z-index:1}
.panel-close{
  background:none;border:1px solid var(--border);color:var(--text);cursor:pointer;
  width:36px;height:36px;border-radius:50%;font-size:1.1rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s,color .15s;position:relative;z-index:1;
}
.panel-close:hover{border-color:var(--accent);color:var(--accent)}

/* Flash en el borde superior al recibir la señal */
.panel-header::before{
  content:'';position:absolute;top:-3px;left:0;right:0;height:3px;
  background:var(--accent);box-shadow:0 0 14px 4px var(--accent);
  opacity:0;border-radius:2px 2px 0 0;pointer-events:none;
}
.panel-header.flash::before{animation:flash-border .55s ease forwards}
@keyframes flash-border{0%{opacity:1}100%{opacity:0}}

/* Ondas de radio — fondo del panel-header */
.radio-waves{
  position:absolute;top:50%;left:-24px;transform:translateY(-50%);
  width:280px;height:280px;pointer-events:none;opacity:0;
  transition:opacity .4s ease .45s;
}
.panel-header.waves-on .radio-waves{opacity:1}
.wave-ring{fill:none;stroke:var(--accent);stroke-width:1.2}
.wave-ring:nth-child(1){animation:wave-expand 2.6s ease-out infinite;animation-delay:0s}
.wave-ring:nth-child(2){animation:wave-expand 2.6s ease-out infinite;animation-delay:.65s}
.wave-ring:nth-child(3){animation:wave-expand 2.6s ease-out infinite;animation-delay:1.3s}
.wave-ring:nth-child(4){animation:wave-expand 2.6s ease-out infinite;animation-delay:1.95s}
@keyframes wave-expand{0%{opacity:.5;stroke-width:1.8;r:10}100%{opacity:0;stroke-width:.3;r:130}}
.wave-dot{fill:var(--accent);opacity:.65}

/* Línea de señal */
#signal-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.signal-line{
  fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;
  stroke-dasharray:1000;stroke-dashoffset:1000;
  filter:drop-shadow(0 0 3px var(--accent));opacity:0;
}
.signal-line.animate{
  animation:draw-signal .35s cubic-bezier(.4,0,.2,1) forwards,
            fade-signal  .3s ease .5s forwards;
}
.signal-dot{fill:var(--accent);opacity:0;filter:drop-shadow(0 0 4px var(--accent))}
.signal-dot.animate{
  animation:dot-arrive .2s ease .32s forwards,
            fade-signal .3s ease .5s forwards;
}
@keyframes draw-signal{0%{stroke-dashoffset:1000;opacity:.9}100%{stroke-dashoffset:0;opacity:.9}}
@keyframes dot-arrive{0%{opacity:0;r:2}60%{opacity:1;r:6}100%{opacity:1;r:4}}
@keyframes fade-signal{to{opacity:0}}

/* EVENT CARDS — same visual as episode-card */
.directo-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1.5rem;
  margin-top:1.5rem;
}

a.episode-card{color:var(--text);text-decoration:none}
a.episode-card:hover h2{color:var(--accent)}

.episode-card{
  display:flex;flex-direction:column;
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
}
.episode-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 24px rgba(0,0,0,.13)}

.episode-cover-link{display:block;flex:none;width:100%;aspect-ratio:1/1;overflow:hidden;background:var(--bg-card)}
.episode-cover-img{width:100%;height:100%;object-fit:cover;display:block}

.episode-body{display:flex;flex-direction:column;flex:1;min-width:0;padding:.65rem .75rem .75rem}
.episode-meta{font-size:.78rem;color:var(--text-dim);margin:0 0 .2rem;letter-spacing:.02em}
.episode-body h2{margin:0 0 .4rem;font-family:var(--font-body);font-weight:600;font-size:.9rem;line-height:1.35}
.episode-actions{display:flex;gap:1.1rem;flex-wrap:wrap;margin-top:auto;padding-top:.75rem;border-top:1px solid var(--border)}
.episode-actions .primary{font-size:.75rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--accent-2)}
</style>

  <div class="map-wrapper">
    <!--
      SVG map of Spain — geographic projection
      x = 30 + (lon + 9.5) × 56.9   (lon range −9.5 → 3.5, viewBox width 800)
      y = 30 + (44.0 − lat) × 59.8  (lat range 44.0 → 35.8, viewBox height 550)
    -->
    <svg id="spain-map" viewBox="0 0 820 580" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mapa de España con ciudades donde se han grabado programas en directo">

      </defs>

      <!-- Valladolid: lat 41.6523, lon -4.7245 → x=302, y=170 -->
      <g class="city-marker" data-city="Valladolid" tabindex="0" role="button" aria-label="Valladolid — 3 eventos">
        <circle cx="302" cy="170" r="28" fill="rgba(0,0,0,0)" pointer-events="all"/>
        <circle class="pulse" cx="302" cy="170" r="14"/>
        <circle class="dot" cx="302" cy="170" r="7"/>
        <text class="city-label" x="316" y="166">Valladolid</text>
      </g>

      <!-- Sevilla: lat 37.39, lon -5.98 → x=230, y=425 -->
      <g class="city-marker" data-city="Sevilla" tabindex="0" role="button" aria-label="Sevilla — 3 eventos">
        <circle cx="230" cy="420" r="28" fill="rgba(0,0,0,0)" pointer-events="all"/>
        <circle class="pulse" cx="230" cy="420" r="14"/>
        <circle class="dot" cx="230" cy="420" r="7"/>
        <text class="city-label" x="244" y="416">Sevilla</text>
      </g>

      <!-- Madrid: lat 40.42, lon -3.70 → x=360, y=244 -->
      <g class="city-marker" data-city="Madrid" tabindex="0" role="button" aria-label="Madrid — 5 eventos">
        <circle cx="360" cy="244" r="28" fill="rgba(0,0,0,0)" pointer-events="all"/>
        <circle class="pulse" cx="360" cy="244" r="14"/>
        <circle class="dot" cx="360" cy="244" r="7"/>
        <text class="city-label" x="374" y="240">Madrid</text>
      </g>

      <!-- Valencia: lat 39.47, lon -0.38 → x=549, y=295 -->
      <g class="city-marker" data-city="Valencia" tabindex="0" role="button" aria-label="Valencia — 2 eventos">
        <circle cx="549" cy="295" r="28" fill="rgba(0,0,0,0)" pointer-events="all"/>
        <circle class="pulse" cx="549" cy="295" r="14"/>
        <circle class="dot" cx="549" cy="295" r="7"/>
        <text class="city-label" x="563" y="291">Valencia</text>
      </g>

      <!-- Barcelona: lat 41.39, lon 2.17 → x=685, y=190 -->
      <g class="city-marker" data-city="Barcelona" tabindex="0" role="button" aria-label="Barcelona — 3 eventos">
        <circle cx="685" cy="190" r="28" fill="rgba(0,0,0,0)" pointer-events="all"/>
        <circle class="pulse" cx="685" cy="190" r="14"/>
        <circle class="dot" cx="685" cy="190" r="7"/>
        <text class="city-label" x="699" y="186">Barcelona</text>
      </g>

      <!-- Lanzarote (in Canarias inset) -->
      <g class="city-marker" data-city="Lanzarote" tabindex="0" role="button" aria-label="Lanzarote — 1 evento">
        <circle cx="162" cy="510" r="22" fill="rgba(0,0,0,0)" pointer-events="all"/>
        <circle class="pulse" cx="162" cy="510" r="11"/>
        <circle class="dot" cx="162" cy="510" r="6"/>
        <text class="city-label" x="162" y="502" text-anchor="middle" font-size="11">Lanzarote</text>
      </g>
    </svg>
    <!-- Línea de señal superpuesta al mapa -->
    <svg id="signal-svg" xmlns="http://www.w3.org/2000/svg">
      <path id="signalLine" class="signal-line"/>
      <circle id="signalDot" class="signal-dot" r="4"/>
    </svg>
  </div>

  <!-- Event panel — shown below map when a city is selected -->
  <div class="city-panel" id="cityPanel">
    <div class="container">
      <div class="panel-header" id="panelHeader">
        <!-- Ondas de radio — fondo decorativo -->
        <svg class="radio-waves" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle class="wave-ring" cx="50" cy="140" r="10"/>
          <circle class="wave-ring" cx="50" cy="140" r="10"/>
          <circle class="wave-ring" cx="50" cy="140" r="10"/>
          <circle class="wave-ring" cx="50" cy="140" r="10"/>
          <circle class="wave-dot" cx="50" cy="140" r="4"/>
        </svg>
        <div style="position:relative;z-index:1;flex:1">
          <h2 class="section-title font-brand" id="panelTitle" style="margin-bottom:0"></h2>
          <p id="panelCount" style="font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:0.2rem 0 0"></p>
        </div>
        <button class="panel-close" id="panelClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="directo-grid" id="eventsGrid"></div>
    </div>
  </div>
</main>

<script src="nav.js?v=4"></script>
<script>
(function () {
  const DATA_URL = "directo.json";
  let data = null;

  async function init() {
    data = await (await fetch(DATA_URL)).json();

    const maxCount = Math.max(...data.map(c => c.eventos.length));
    data.forEach(city => {
      const marker = document.querySelector(`.city-marker[data-city="${city.ciudad}"]`);
      if (!marker) return;
      const n = city.eventos.length;
      const dotR = Math.round(4 + (n / maxCount) * 6);
      const pulseR = dotR * 2;
      const dot = marker.querySelector('circle.dot');
      const pulse = marker.querySelector('circle.pulse');
      if (!dot || !pulse) return;
      const cx = dot.getAttribute('cx'), cy = dot.getAttribute('cy');
      dot.setAttribute('r', dotR);
      dot.style.transformOrigin = `${cx}px ${cy}px`;
      pulse.setAttribute('r', pulseR);
      pulse.style.transformOrigin = `${cx}px ${cy}px`;
      marker.setAttribute('aria-label', `${city.ciudad} — ${n} ${n === 1 ? 'evento' : 'eventos'}`);
    });

    document.querySelectorAll(".city-marker").forEach((marker) => {
      marker.addEventListener("click", () => openCity(marker.dataset.city));
      marker.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openCity(marker.dataset.city); }
      });
    });
    document.getElementById("panelClose").addEventListener("click", closePanel);
  }

  const MESES = {enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12};
  function parseFecha(fecha) {
    if (!fecha) return Infinity;
    const m = fecha.match(/(\d+)\s+de\s+(\w+)\s+de\s+(\d+)/);
    if (!m) {
      const my = fecha.match(/(\w+)\s+de\s+(\d{4})/);
      if (my) return new Date(+my[2], (MESES[my[1].toLowerCase()] || 1) - 1, 1).getTime();
      const y = fecha.match(/^(\d{4})$/);
      return y ? new Date(+y[1], 0, 1).getTime() : Infinity;
    }
    return new Date(+m[3], (MESES[m[2].toLowerCase()] || 0) - 1, +m[1]).getTime();
  }

  function openCity(cityName) {
    const city = data.find((c) => c.ciudad === cityName);
    if (!city) return;

    document.getElementById("panelTitle").textContent = city.ciudad;
    const n = city.eventos.length;
    document.getElementById("panelCount").textContent = `${n} ${n === 1 ? 'evento' : 'eventos'} en directo`;

    const eventos = [...city.eventos].sort((a, b) => parseFecha(a.fecha) - parseFecha(b.fecha));
    const grid = document.getElementById("eventsGrid");
    grid.innerHTML = eventos.map((ev) => `
      <a class="episode-card" href="episodios/${ev.episodioSlug}.html">
        <div class="episode-cover-link">
          <img src="${ev.cartel}" alt="${ev.titulo}" class="episode-cover-img" loading="lazy" />
        </div>
        <div class="episode-body">
          <p class="episode-meta">${ev.lugar}${ev.fecha ? " · " + ev.fecha : ""}</p>
          <h2>${ev.titulo}</h2>
          <div class="episode-actions">
            <span class="primary">Escuchar episodio →</span>
          </div>
        </div>
      </a>
    `).join("");

    const panel = document.getElementById("cityPanel");
    panel.classList.add("open");
    panel.scrollIntoView({ behavior: "smooth", block: "nearest" });

    document.querySelectorAll(".city-marker").forEach((m) => m.classList.remove("selected"));
    const activeMarker = document.querySelector(`.city-marker[data-city="${cityName}"]`);
    activeMarker.classList.add("selected");

    // Animar señal de radio
    requestAnimationFrame(() => fireSignal(activeMarker));
  }

  function fireSignal(markerEl) {
    const dot = markerEl.querySelector("circle.dot");
    if (!dot) return;

    const mapWrap = document.querySelector(".map-wrapper");
    const panelHeader = document.getElementById("panelHeader");
    if (!mapWrap || !panelHeader) return;

    const wrapRect   = mapWrap.getBoundingClientRect();
    const svgEl      = mapWrap.querySelector("#spain-map");
    const svgRect    = svgEl.getBoundingClientRect();
    const vb         = svgEl.viewBox.baseVal;
    const scaleX     = svgRect.width  / vb.width;
    const scaleY     = svgRect.height / vb.height;

    const cx = parseFloat(dot.getAttribute("cx"));
    const cy = parseFloat(dot.getAttribute("cy"));
    const x1 = (svgRect.left - wrapRect.left) + cx * scaleX;
    const y1 = (svgRect.top  - wrapRect.top)  + cy * scaleY;

    const panelRect = panelHeader.getBoundingClientRect();
    const x2 = (panelRect.left - wrapRect.left) + panelRect.width / 2;
    const y2 = panelRect.top - wrapRect.top;

    const cpx = x1 + (x2 - x1) * 0.35;
    const cpy = y1 + (y2 - y1) * 0.55;

    const line = document.getElementById("signalLine");
    const sdot = document.getElementById("signalDot");
    line.setAttribute("d", `M ${x1} ${y1} Q ${cpx} ${cpy} ${x2} ${y2}`);
    line.style.strokeDasharray  = "1000";
    line.style.strokeDashoffset = "1000";
    sdot.setAttribute("cx", x2);
    sdot.setAttribute("cy", y2);

    line.classList.remove("animate"); sdot.classList.remove("animate");
    void line.offsetWidth;
    line.classList.add("animate"); sdot.classList.add("animate");

    // Flash + ondas al llegar la señal
    panelHeader.classList.remove("flash", "waves-on");
    void panelHeader.offsetWidth;
    panelHeader.classList.add("flash", "waves-on");
  }

  function closePanel() {
    document.getElementById("cityPanel").classList.remove("open");
    document.getElementById("panelHeader").classList.remove("waves-on");
    document.querySelectorAll(".city-marker").forEach((m) => m.classList.remove("selected"));
  }

  init();
})();
</script>
</body>
</html>
